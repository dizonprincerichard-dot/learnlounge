<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnLounge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated floating icons -->
<div class="floating-icons">
  <span>💛</span><span>🧡</span><span>🤎</span><span>📚</span><span>🛋️</span>
</div>

<header>
  <h1>LearnLounge</h1>
  <p class="tagline">🛋️ Your Safe Space to Share Without Fear</p>
</header>

<!-- Category stats -->
<div id="categoryStats" class="stats-box">
  Loading stats...
</div>

<!-- Quote of the day -->
<div id="quoteOfTheDay" class="quoteBox"></div>

<!-- Home Categories -->
<div id="home" class="categories">
  <div class="homeVisuals">
    <div class="homeCard" style="background:#FFD699;">Share your thoughts freely! 💬</div>
    <div class="homeCard" style="background:#F6B26B;">Safe, anonymous, and fun 🛋️</div>
    <div class="homeCard" style="background:#E69138;">Connect with other students 📚</div>
  </div>

  <button class="category-btn" onclick="openCategory('Rants')">Rants</button>
  <button class="category-btn" onclick="openCategory('Academics')">Academics</button>
  <button class="category-btn confessionBtn" onclick="openCategory('Confessions')">Confessions</button>
</div>

<!-- Category page -->
<div id="categoryPage" class="categoryPage">
  <button onclick="goHome()" class="backBtn">← Home</button>
  <h2 id="categoryTitle"></h2>

  <!-- Leaderboard Button -->
  <button class="leaderboardBtn" onclick="showLeaderboard()">🏆 Show Top 10</button>
  <div id="leaderboardContainer" class="leaderboardContainer"></div>

  <!-- Profile and post box -->
  <div class="profile">
    <label for="username">Username:</label>
    <input type="text" id="username" placeholder="Anonymous">
    <label for="userColor">Pick your color:</label>
    <input type="color" id="userColor" value="#FFA500">
    <label for="postFont">Font:</label>
    <select id="postFont">
      <option value="'Arial', sans-serif">Arial</option>
      <option value="'Georgia', serif">Georgia</option>
      <option value="'Courier New', monospace">Courier</option>
      <option value="'Palatino Linotype', serif">Palatino</option>
      <option value="'Times New Roman', serif">Times</option>
      <option value="'Verdana', sans-serif">Verdana</option>
      <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
      <option value="'Lucida Console', monospace">Lucida</option>
    </select>
    <label for="postBg">Post Theme:</label>
    <select id="postBg">
      <option value="#FFF1E0">Cream</option>
      <option value="#FFE0B2">Light Orange</option>
      <option value="#FFD699">Soft Yellow</option>
      <option value="#F6B26B">Peach</option>
      <option value="#E69138">Vintage Orange</option>
      <option value="#DFA869">Brownish</option>
    </select>
  </div>

  <div class="postBox">
    <textarea id="message" placeholder="Share your thoughts..."></textarea>
    <button onclick="postMessage()">Post</button>
  </div>

  <div id="posts"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
