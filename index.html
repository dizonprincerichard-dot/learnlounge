<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnLounge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated floating icons -->
<div class="floating-icons">
  <span>💛</span><span>🧡</span><span>🤎</span><span>📚</span><span>🛋️</span>
</div>

<header>
  <h1>LearnLounge</h1>
  <p class="tagline">🛋️ Your Safe Space to Share Without Fear</p>
</header>

<!-- Profile -->
<div class="profile">
  <label for="username">Username:</label>
  <input type="text" id="username" placeholder="Anonymous">
  <label for="userColor">Pick your color:</label>
  <input type="color" id="userColor" value="#FFA500">
</div>

<!-- Category stats -->
<div id="categoryStats" class="stats-box">
  Loading stats...
</div>

<!-- Home Categories -->
<div id="home" class="categories">
  <button class="category-btn" onclick="openCategory('Rants')">Rants</button>
  <button class="category-btn" onclick="openCategory('Academics')">Academics</button>
  <button class="category-btn" onclick="openCategory('Confessions')">Confessions</button>
</div>

<!-- Category page -->
<div id="categoryPage" class="categoryPage">
  <button onclick="goHome()" class="backBtn">← Home</button>
  <h2 id="categoryTitle"></h2>

  <div class="postBox">
    <textarea id="message" placeholder="Share your thoughts..."></textarea>
    <button onclick="postMessage()">Post</button>
  </div>

  <div id="posts"></div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
