<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnLounge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME PAGE -->
  <div id="home">
    <h1 id="siteName">LearnLounge</h1>
    
    <!-- New Emoji and Tagline -->
    <div id="taglineContainer">
      <div id="sofaEmoji">🛋️</div>
      <p id="taglineText">Your Safe Space to Share Without Fear</p>
    </div>

    <div id="categoryButtons">
      <button onclick="openCategory('Rants')">💬 Rants</button>
      <button onclick="openCategory('Academics')">📚 Academics</button>
      <button onclick="openCategory('Confessions')">🤫 Confessions</button>
    </div>
  </div>

  <!-- CATEGORY PAGE -->
  <div id="categoryPage" style="display:none;">
    <button onclick="goHome()" id="backButton">⬅ Back</button>
    <h2 id="categoryTitle"></h2>

    <div id="postInputContainer">
      <input type="text" id="username" placeholder="Enter username (optional)">
      <textarea id="message" placeholder="Write your post..."></textarea>
      <button onclick="postMessage()" id="postButton">Post</button>
    </div>

    <div id="posts"></div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
